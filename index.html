<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfferWall</title>

<style>
body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
}
h1{
    text-align:center;
    padding:20px;
}
#offers{
    max-width:900px;
    margin:auto;
    padding:15px;
}
.offer{
    background:#1f2937;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}
.offer img{
    width:70px;
    height:70px;
    border-radius:10px;
}
button{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>OfferWall</h1>

<div id="offers">Loading...</div>

<script>

const API="https://d1cdbd1x576ga0.cloudfront.net/public/offers/feed.php?user_id=806670&api_key=09372f9e30477bfab889e35e0931353a&s1=&s2=";

fetch(API)
.then(res=>res.json())
.then(data=>{

console.log(data);

let offers=[];

if(Array.isArray(data)){
    offers=data;
}else if(data.offers){
    offers=data.offers;
}else if(data.data){
    offers=data.data;
}

if(offers.length===0){
    document.getElementById("offers").innerHTML="<h2>No Offers Found</h2>";
    return;
}

let html="";

offers.forEach(o=>{

html+=`
<div class="offer">

<img src="${o.network_icon || o.icon || ''}">

<h2>${o.name || ''}</h2>

<p>${o.anchor || ''}</p>

<p><b>${o.payout || ''}</b></p>

<button onclick="window.location='${o.url}'">
Start Offer
</button>

</div>
`;

});

document.getElementById("offers").innerHTML=html;

})
.catch(err=>{

console.log(err);

document.getElementById("offers").innerHTML=`
<h2>تعذر تحميل العروض</h2>
<p>إذا كان رابط الـ API يعمل مباشرة ولكن لا يعمل هنا، فالمشكلة غالبًا هي CORS من السيرفر.</p>
`;

});

</script>

</body>
</html>
